services:
  - type: web
    name: proxy-rt-api
    env: docker
    healthCheckPath: /health
    envVars:
      - key: PLAYWRIGHT_HEADLESS
        value: "false"
      - key: TIMEOUT_DEFAULT_MS
        value: "4500"
      - key: MAX_RENDER_RETRIES
        value: "1"
      - key: ARRIVALS_LOCK_TIMEOUT_MS
        value: "5000"